name: Scrape 539 Lottery Data

on:
  schedule:
    # 每天 21:15 台灣時間（13:15 UTC），開獎後15分鐘更新
    - cron: '15 13 * * *'
  workflow_dispatch: # 允許手動觸發

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape 539 data
        run: python scripts/scrape_539.py

      - name: Commit data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/lotto539.json
          git diff --staged --quiet || git commit -m "🎯 Update 539 lottery data $(date '+%Y-%m-%d %H:%M') TW"
          git push
